{% extends 'gestion/base.html' %}
{% block content %}
<h2>Eliminar Reserva</h2>
<p>¿Estás seguro de que deseas eliminar la reserva "{{ object }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar</button>
</form>
<a href="{% url 'reserva_list' %}">Cancelar</a>
{% endblock %}
