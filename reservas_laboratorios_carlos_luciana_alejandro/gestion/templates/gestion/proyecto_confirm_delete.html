{% extends 'gestion/base.html' %}
{% block content %}
<h2>Eliminar Proyecto</h2>
<p>¿Estás seguro de que deseas eliminar el proyecto "{{ object }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar</button>
</form>
<a href="{% url 'proyecto_list' %}">Cancelar</a>
{% endblock %}
