{% extends 'gestion/base.html' %}
{% block content %}
<div class="row mb-4">
    <div class="col-md-8">
        <h2>Agregar Comentario</h2>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.as_p }}
            </div>
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <a href="{% url 'proyecto_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">Enviar Comentario</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
