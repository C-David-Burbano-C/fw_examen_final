{% extends 'gestion/base.html' %}
{% block content %}
<h2>Listado de Reservas</h2>
<a href="{% url 'reserva_create' %}">Nueva Reserva</a>
<ul>
    {% for reserva in reservas %}
    <li>
        {{ reserva }} 
        {% if reserva.usuario == request.user %}
        - <a href="{% url 'reserva_update' reserva.pk %}">Editar</a>
        - <a href="{% url 'reserva_delete' reserva.pk %}">Eliminar</a>
        {% endif %}
    </li>
    {% endfor %}
</ul>
{% endblock %}
