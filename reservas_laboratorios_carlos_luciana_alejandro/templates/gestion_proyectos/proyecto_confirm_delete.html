{% extends 'base.html' %}

{% block title %}Eliminar proyecto{% endblock %}

{% block content %}
<section class="content-header">
    <p class="eyebrow">Eliminar</p>
    <h1>{{ object.titulo }}</h1>
    <p class="muted">Esta accion no se puede deshacer.</p>
</section>

<section class="form-panel">
    <form method="post">
        {% csrf_token %}
        <div class="actions-row">
            <button class="danger-button" type="submit">Eliminar proyecto</button>
            <a class="secondary-link" href="{% url 'gestion_proyectos:proyecto_list' %}">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
