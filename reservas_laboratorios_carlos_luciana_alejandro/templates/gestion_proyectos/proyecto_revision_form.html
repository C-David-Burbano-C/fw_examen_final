{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Revision del proyecto{% endblock %}

{% block content %}
<section class="content-header">
    <p class="eyebrow">Revision docente</p>
    <h1>{{ object.titulo }}</h1>
    <p class="muted">Actualiza el estado y la calificacion del proyecto.</p>
</section>

<section class="form-panel">
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="actions-row">
            <button class="primary-button fit-button" type="submit">Guardar revision</button>
            <a class="secondary-link" href="{% url 'gestion_proyectos:proyecto_detail' object.pk %}">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
