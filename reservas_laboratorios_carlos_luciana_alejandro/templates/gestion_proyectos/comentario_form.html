{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Nuevo comentario{% endblock %}

{% block content %}
<section class="content-header">
    <p class="eyebrow">Comentario</p>
    <h1>Agregar comentario</h1>
</section>

<section class="form-panel">
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="actions-row">
            <button class="primary-button fit-button" type="submit">Enviar comentario</button>
            <a class="secondary-link" href="{% url 'gestion_proyectos:proyecto_detail' view.proyecto.pk %}">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
